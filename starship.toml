# Move the prompt to a new line
add_newline = true

# The main prompt layout
format = """
$directory$git_branch$git_status$fill$cmd_duration$nodejs$golang$docker_context$python$time
$character"""

[fill]
symbol = "─"
style = "#444444"

[directory]
style = "bold #00ffff"
truncate_to_repo = false
truncation_length = 8
symbol = " "

[git_branch]
symbol = " "
style = "bold #00ff00"

[git_status]
style = "bold #ff0000"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[cmd_duration]
min_time = 500
style = "bold #ffcc00"
format = "took [$duration]($style) "

[time]
disabled = false
format = "at [$time](bold #888888) "
time_format = "%T"

[nodejs]
symbol = "󰎙 "
format = "[$symbol($version)](bold #00ff00) "
detect_files = ["package.json", ".node-version", "nvmrc"]

[golang]
symbol = " "
format = "[$symbol($version)](bold #00ffff) "

[docker_context]
symbol = " "
format = "[$symbol($context)](bold #00aaff) "

[python]
symbol = " "
format = "[$symbol(${pyenv_prefix}${version})](bold #ffcc00) "

[character]
success_symbol = "[❯](bold #00ff00)"
error_symbol = "[❯](bold #ff0000)"

[package]
disabled = true

[gcloud]
disabled = true
