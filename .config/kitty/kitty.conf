# kitty config — adopted 2026-05-13 to replace Ghostty under AeroSpace.
#
# Why we moved off Ghostty: Ghostty on macOS uses native NSWindow tabs,
# where each tab is a separate macOS window joined into a tab group by
# AppKit. AeroSpace counts every NSWindow as a tileable window, so
# adding a tab to one Ghostty window made AeroSpace re-tile the screen
# as if N more windows had been opened. Ghostty has no setting to
# disable this on macOS (verified against the full config reference and
# `ghostty +show-config --default` — only `tab-inherit-working-directory`,
# `window-new-tab-position`, and the GTK-only `window-show-tab-bar`).
#
# Kitty renders tabs internally inside one OS window, so AeroSpace sees
# one window per Kitty instance regardless of tab count. See
# learnings under amplify/dotfiles/aerospace-wrong for the full writeup.

# ---- Clipboard ----
# Allow OSC 52 writes from terminal apps (cloudcode, tmux, ssh) to
# land in the system clipboard without a prompt. Reads still prompt
# (security: prevents remote-via-ssh programs from silently reading
# the clipboard). This matches Ghostty's `clipboard-write = allow` /
# `clipboard-read = ask`.
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
strip_trailing_spaces smart

# Auto-copy any mouse selection straight to the system clipboard.
# Default is empty string (off — kitty only copies on cmd+c). Setting
# this to `clipboard` matches the iTerm2 / Linux X11 PRIMARY-selection
# muscle memory: highlight text → it's copied, no keystroke needed.
# Other valid values: `a1`/`a2`/... to write to a named kitty buffer
# instead of the system clipboard, or empty to disable.
# Note: this writes to the same macOS pasteboard cmd+v reads from, so
# it WILL clobber whatever you previously cmd+c'd. If that becomes
# annoying, switch the value to a named buffer (e.g. `a1`) and bind
# a paste-from-buffer key.
copy_on_select clipboard

# ---- Tabs (the whole reason we're here) ----
# Kitty renders the tab bar internally inside a single OS window —
# this is the default behavior on macOS and is non-overridable, which
# is exactly what we want for AeroSpace compatibility.
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Tab title template. Available vars include {index} (the number you'd
# pass to `goto_tab`), {title} (last OSC-2 title set by the shell, which
# zsh+kitty shell-integration auto-sets to "user@host: cwd"), plus
# {tab.active_exe} / {tab.active_wd} if you want process/dir info
# (those two cost a syscall per redraw — fine for a handful of tabs).
# {fmt.fg.<color>} / {fmt.bg.<color>} let you inline-style segments;
# `tab` is the special name meaning "the tab's own fg/bg" so you can
# return to default coloring after a styled run.
tab_title_template "{fmt.fg.color8}{index}{fmt.fg.tab} {title}"
# active_tab_title_template falls back to tab_title_template if unset.
# Override it here if you want the focused tab to look different —
# e.g. drop the dim index color since the active tab already pops.
active_tab_title_template "{index} {title}"

# Tab bar colors. These paint the slanted powerline segments.
# Active = currently focused tab; inactive = the others.
active_tab_foreground   #282c34
active_tab_background   #f0c674
active_tab_font_style   bold
inactive_tab_foreground #c5c8c6
inactive_tab_background #3a3f4b
inactive_tab_font_style normal
# tab_bar_background paints the strip *behind* the tabs (the gap to
# the right of the last tab, etc.). `none` = use the terminal bg.
tab_bar_background      none

# Use macOS native fullscreen (cmd+enter) rather than kitty's
# borderless fullscreen, so AeroSpace fullscreen / native fullscreen
# stay distinct and predictable.
macos_traditional_fullscreen no

# Quit the kitty *process* when its last OS window closes. macOS
# default kitty behavior is to keep the NSApp alive with no windows
# (NSApplicationDelegate "stay running" pattern), which silently
# accumulates one zombie kitty process per closed window. AeroSpace
# can't see them, you can't see them, but each one holds a unix
# socket open under /tmp/kitty-$USER-$PID. Eight piled up over a
# few hours of normal cmd+w use before this was caught. Setting
# this to yes makes cmd+w on the last window also quit the process,
# so process count == visible window count at all times.
macos_quit_when_last_window_closed yes

# ---- Window / titlebar ----
# Hide just the titlebar; keep macOS rounded corners. We briefly
# squared the corners (`titlebar-and-corners`) to dodge corner-
# clipping of the focus border, but the rounded look reads better
# under AeroSpace tiling — and with `inactive_border_color` set to
# the terminal bg below, the inactive border is invisible so any
# corner clipping only matters on the focused window. The active
# yellow border + `window_margin_width 4` (further down) push the
# stroke inboard far enough that the rounded mask doesn't bite it.
hide_window_decorations titlebar-only

# ---- Focus highlight (border-based) ----
# Goal: visually mark which kitty OS window is focused, without
# scripts or AeroSpace callbacks. Kitty natively colors window
# borders by focus state — but only between SPLITS in one OS window
# by default. The `draw_window_borders_for_single_window` switch
# extends the same coloring to single-window OS windows, which is
# our entire setup under AeroSpace (one kitty window per OS window).
# Per kitty docs: "The border will show in the active color when the
# window is focused and the OS window has focus, and in the inactive
# color when the OS window loses focus."
#
# NOTE on "yellow only at the bottom": kitty's `window_border_width`
# is a single uniform value — there is no per-side border. The
# closest approximation is to draw the border on all four sides but
# make the inactive color match the terminal background (#282c34)
# so the unfocused window looks borderless, while the focused one
# pops with a full yellow halo. If kitty ever grows per-edge border
# widths, the right shape is `window_border_width 0 0 4 0` (top
# right bottom left). Until then, four-sided active border is the
# closest we can get without writing a focus-listener script.
draw_window_borders_for_single_window yes
# 4pt = bold halo. Default 0.5pt is invisible.
window_border_width 4pt
# Active = bright yellow (color3 from our palette, same as the
# active tab bg, so the focus highlight matches the tab styling).
active_border_color   #f0c674
# Inactive = match terminal bg so unfocused windows look completely
# borderless. Only the focused window shows the yellow halo. Swap
# to a real grey like #444 if you ever want every window framed
# i3-style.
inactive_border_color #282c34
# Outer margin between the border and the OS-window edge. With
# rounded corners (titlebar-only above) the macOS rounding mask
# clips ~4pt at each corner; pushing the border inboard by 4pt
# keeps the yellow stroke fully visible on the focused window
# instead of getting eaten by the corner curve.
window_margin_width 4
# Pin the cell area to the top-left of the available space; send
# all leftover slack (from window-size mod cell-size) to the
# bottom-right corner, where the inside-the-border padding absorbs
# it. This makes the top + left edges of the cell area always
# flush with the border. (Default is `center`, which spreads slack
# to all four edges and causes overlap on every side.)
placement_strategy top-left

# ---- Transparency ----
# Global background opacity. Affects EVERY kitty OS window equally
# (kitty has no built-in "dim on OS-window blur" — the focus border
# above is doing that job instead). 0.96 = barely-there hint of the
# desktop behind; 0.92 was the prior value (slightly more see-
# through); drop toward 0.80 for noticeable transparency. Has a
# measurable GPU cost and only applies to cells whose bg matches
# the default terminal bg, so editors with their own bg color will
# still look opaque — see `transparent_background_colors` to fix
# specific colors if that bites you.
background_opacity 0.96
# Lets you tweak opacity live with ctrl+shift+a>m (more) /
# ctrl+shift+a>l (less) without editing this file. Cheap to leave
# on; required if you ever want to bring back a focus-listener
# script to drive `kitten @ set-background-opacity`.
dynamic_background_opacity yes
# macOS-only: blur the desktop visible behind the transparent bg.
# 0 disables, 20 is a comfortable "frosted glass" look, >64 starts
# tanking framerate.
background_blur 20

# ---- Performance ----
# Default 10ms repaint; 8ms = ~125fps if monitor supports it.
repaint_delay 8
input_delay 1
sync_to_monitor yes

# ---- Fonts ----
# Match Ghostty's defaults so this terminal feels identical to the
# one we just left. Both Ghostty (no font_family set) and Kitty
# (font_family monospace) resolve to Menlo Regular on macOS — the
# only differences were size (Ghostty 13pt, Kitty 11pt) and
# foreground color (Ghostty #ffffff, Kitty #dddddd).
font_family      Menlo
font_size        13.0

# ---- Colors (Ghostty defaults: charcoal bg + Tomorrow Night Bright
# 16-color palette + pure-white foreground). Captured 2026-05-13 from
# `ghostty +show-config --default`. ----
foreground       #ffffff
background       #282c34
cursor           #ffffff
cursor_text_color background

# Selection: Ghostty inverts fg/bg by default when selection-foreground
# and selection-background are unset, which is what kitty does when you
# omit selection_* — so we leave those at default.

# 16-color ANSI palette (Tomorrow Night Bright family — same as
# Ghostty's hardcoded defaults).
color0  #1d1f21
color1  #cc6666
color2  #b5bd68
color3  #f0c674
color4  #81a2be
color5  #b294bb
color6  #8abeb7
color7  #c5c8c6
color8  #666666
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #eaeaea

# Padding INSIDE the border (between the border and the cell area).
# Doubles as a "slack absorber": when OS window height isn't an
# exact multiple of cell height, the leftover pixels hide inside
# this padding instead of overflowing past the border. With
# `placement_strategy top-left`, all slack lands at the bottom-right
# corner; 4pt of padding there is enough to absorb a partial cell
# row + column on the BenQ RD320U at typical AeroSpace tile sizes.
# Drop to 2 (Ghostty parity) if you want tighter text-to-border;
# bump to 6+ if you ever see the cell area peeking past the
# bottom-right border on a different display.
window_padding_width 4

# ---- macOS keybindings ----
# cmd+enter toggles fullscreen, matching the binding used in Ghostty.
map cmd+enter toggle_fullscreen
# cmd+t (new_tab), cmd+w (close_tab) are kitty defaults on macOS.
# cmd+1..9 are kitty defaults too, BUT they trigger first_window..
# ninth_window — switchers between SPLITS inside one tab. Not what
# you want when you have one window per tab. Leaving those defaults
# alone (no real cost since we don't use splits, future-proof if we
# ever do) and adding cmd+option+1..9 for tab navigation, matching
# iTerm2 / Ghostty muscle memory.
map cmd+alt+1 goto_tab 1
map cmd+alt+2 goto_tab 2
map cmd+alt+3 goto_tab 3
map cmd+alt+4 goto_tab 4
map cmd+alt+5 goto_tab 5
map cmd+alt+6 goto_tab 6
map cmd+alt+7 goto_tab 7
map cmd+alt+8 goto_tab 8
map cmd+alt+9 goto_tab 9

# ---- Mouse: cmd+click opens links (even inside mouse-grabbing TUIs) ----
# Why this is needed: kitty's default URL-open click is ctrl+shift+left
# (the only mouse-binding it ships with grabbed=both). Inside a TUI that
# enables xterm mouse tracking (cloudcode, tmux, vim, less, etc.) plain
# left-click is forwarded to the inner app, so URLs printed by the TUI
# are never opened by kitty. The `grabbed,ungrabbed` modifier on the
# mouse_map lines below makes kitty intercept cmd+click BEFORE handing
# the event to the inner app, restoring the macOS-conventional
# cmd+click-to-open-link gesture (Safari/Chrome/iTerm2 muscle memory).
#
# Three subtleties learned the hard way (kitty 0.46+):
#
#  1. The action `mouse_click_url_or_select` is NOT a documented kitty
#     action — kitty silently drops the binding (or treats it as a no-op
#     legacy alias). The canonical action is `mouse_handle_click` with
#     a subset of `selection`, `link`, and `prompt` selectors.
#
#  2. `event-type click` defers ~click_interval (default 500ms) to
#     disambiguate clicks from double/triple-presses. Any tiny cursor
#     drift in that window flips the gesture into press+drag, which
#     fires the default `left press → mouse_selection normal` handler
#     instead of the click handler — the symptom is "URL click works
#     intermittently". Bind to `release` instead to dodge the delay
#     entirely (kitty's own ctrl+shift+left default does the same).
#
#  3. The `selection` selector in `mouse_handle_click selection link
#     prompt` short-circuits the open if a selection already exists.
#     Combined with `copy_on_select clipboard` above (and macOS not
#     notifying on clipboard ownership change — kitty docs call this
#     out explicitly), stale selections silently swallow URL clicks.
#     We pass just `link` so cmd+click ALWAYS attempts to open a URL,
#     ignoring whatever selection state happens to exist.
#
# Tradeoff: cmd+click on non-URL text now does nothing (instead of
# extending a selection). Plain left-click selection still works as
# normal — cmd+click is reserved exclusively for "open URL", matching
# Safari/Chrome behavior.
#
# Press half is suppressed in grabbed mode so the inner TUI doesn't
# see a phantom mouse-down before the release fires the open. In
# ungrabbed mode there's no consumer to bother, so we leave press
# alone (omitting it would also disable plain selection start).
#
# `combine` chains: first try the open_google_link.py kitten which
# matches Google internal short-links like cl/123, b/456, go/foo,
# cs/path, who/ldap (kitty's URL auto-detector requires `scheme://`
# so it never sees these); if that finds nothing, fall through to
# kitty's standard mouse_handle_click which opens real https:// URLs.
# Order matters: kitten runs first, then mouse_handle_click (which
# is a no-op when the kitten already opened something). See
# ~/.config/kitty/open_google_link.py for the matching patterns.
mouse_map cmd+left release grabbed,ungrabbed combine : kitten open_google_link.py : mouse_handle_click link
mouse_map cmd+left press   grabbed           discard_event

# ---- Hover highlight for Google internal short-links ----
# Kitty's URL auto-detector only highlights `scheme://...` matches,
# so bare `cl/123`, `b/456`, `go/foo`, etc. get no visual cue even
# though our cmd+click handler above opens them correctly. The
# `marker` feature is the closest substitute: a per-window regex
# overlay that styles matching text. We bind cmd+shift+m to toggle
# it. The mark persists until toggled off or the window closes.
#
# Color choice: mark1_background is set below to a muted yellow that
# reads as "this is interactive" without screaming. mark1_foreground
# is left at terminal default so the text remains legible in any
# theme.
#
# Pattern matches the same prefix set as the click kitten. Keep them
# in sync — if you add a prefix to open_google_link.py, add it here
# too. \b on each side prevents partial matches inside larger words
# (e.g. won't highlight `recall/` because `cl` is mid-word).
map cmd+shift+m toggle_marker iregex 1 \b(cl|b|go|cs|who|playbook|teams|monorail|moma|yaqs|qs|sponge|sponge2|piper|fig|crrev|ariane|buganizer|chat|drive|docs)/[A-Za-z0-9._/?#&=:%@+\-]+\b

# Marker style for group 1 (the only group we use). Subtle yellow bg,
# default fg, matches the focus-border yellow (#f0c674) we use for
# active windows so the visual language stays consistent.
mark1_background  #f0c674
mark1_foreground  #282c34

# Cursor change on hover: when the mouse is over a clickable URL,
# kitty already changes the pointer shape to a hand — that visual
# feedback works even in grabbed mode and is your tell that the
# cmd+click will hit kitty rather than the inner app.

# ---- Mouse: right-click pastes from clipboard ----
# macOS / iTerm2 / Windows-terminal muscle memory: a bare right-click
# in the terminal pastes the system clipboard. Kitty ships no default
# binding for the right button at all (defaults are: ctrl+shift+left =
# open URL, middle = paste from primary selection on Linux). Adding
# the binding below restores the cross-platform expectation.
#
# `grabbed,ungrabbed` (same pattern as the cmd+left URL binding above)
# means kitty intercepts the click BEFORE handing the event to a TUI
# that has enabled xterm mouse tracking (cloudcode, vim, tmux, less).
# Without that, plain right-click would be forwarded to the inner app
# and trigger e.g. vim's "extend selection" instead of pasting.
#
# `paste_from_clipboard` reads the system pasteboard (the same one
# cmd+v uses, and the same one `copy_on_select clipboard` writes to).
# Note: bracketed paste mode is honored automatically — apps that
# opted into it (zsh, vim, neovim, etc.) will see the bracketing
# escapes and won't autoindent / autoexecute the pasted text.
mouse_map right press grabbed,ungrabbed paste_from_clipboard

# ---- Remote control ----
# Allow `kitten @` commands over a unix socket so scripts (and
# AeroSpace-launched panes) can drive an existing kitty instance.
# socket-only = no remote control via the TTY (more secure than `yes`).
allow_remote_control socket-only
listen_on unix:/tmp/kitty-$USER
