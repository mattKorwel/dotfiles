# AeroSpace Configuration (Matched to Komorebi Windows setup)
# https://github.com/nikitabobko/AeroSpace

config-version = 2

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layouts
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Persistent Workspaces
# Ensures named workspaces exist even when empty
persistent-workspaces = ['6-Dev', '7-Google', '8-Comms', '9-Pers']

# Monitor Assignment
# All workspaces consolidated to the primary monitor
[workspace-to-monitor-force-assignment]
'6-Dev' = 'BenQ RD320U'
'7-Google' = 'BenQ RD320U'
'8-Comms' = 'BenQ RD320U'
'9-Pers' = 'BenQ RD320U'

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Note: previously had an `on-focus-changed` callback driving a
# script that toggled kitty background opacity to highlight the
# focused window. The callback never fired in this AeroSpace
# version (0.20.3-Beta) — `on-focused-monitor-changed` works fine
# (mouse-follow above) but `on-focus-changed` did not, even after
# `launchctl kickstart` of the AeroSpace agent. Switched to a
# kitty-side solution: see kitty.conf
# `draw_window_borders_for_single_window` + `active_border_color`,
# which colors the kitty window border on focus state without any
# external script. If we ever want opacity-based highlighting
# again, the script lives in git history and the kitty side
# (dynamic_background_opacity, listen_on, allow_remote_control)
# is still in place.

# Gaps
[gaps]
    inner.horizontal = 5
    inner.vertical =   5
    outer.left =       5
    outer.bottom =     5
    outer.top =        5
    outer.right =      5

# 'main' binding mode
[mode.main.binding]
    # --- Navigation (Matched to Komorebi AHK) ---
    # Seamlessly cross monitor boundaries
    alt-i = 'focus --boundaries all-monitors-outer-frame up'
    alt-k = 'focus --boundaries all-monitors-outer-frame down'
    alt-j = 'focus --boundaries all-monitors-outer-frame left'
    alt-l = 'focus --boundaries all-monitors-outer-frame right'

    # --- Move (Matched to Komorebi AHK) ---
    alt-shift-i = 'move up'
    alt-shift-k = 'move down'
    alt-shift-j = 'move left'
    alt-shift-l = 'move right'

    # --- Monitor Management ---
    # Switch focus between monitors
    alt-period = 'focus-monitor next'
    alt-comma = 'focus-monitor prev'
    # Move window to the other monitor
    alt-shift-period = 'move-node-to-monitor next'
    alt-shift-comma = 'move-node-to-monitor prev'

    # --- Layout Control ---
    alt-f = 'fullscreen'
    alt-s = 'layout accordion horizontal vertical'
    alt-t = 'layout floating tiling'
    alt-slash = 'layout tiles horizontal vertical' # Toggle between horizontal and vertical
    alt-0 = 'balance-sizes' # Even out the grid
    alt-leftSquareBracket = 'focus --boundaries-action wrap-around-the-workspace dfs-prev'
    alt-rightSquareBracket = 'focus --boundaries-action wrap-around-the-workspace dfs-next'

    # --- Workspaces (Matched to Alt+6/7/8/9) ---
    alt-n = 'workspace --wrap-around next'
    alt-p = 'workspace --wrap-around prev'
    alt-tab = 'workspace-back-and-forth'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6-Dev'
    alt-7 = 'workspace 7-Google'
    alt-8 = 'workspace 8-Comms'
    alt-9 = 'workspace 9-Pers'

    alt-shift-n = 'move-node-to-workspace --wrap-around next'
    alt-shift-p = 'move-node-to-workspace --wrap-around prev'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6-Dev'
    alt-shift-7 = 'move-node-to-workspace 7-Google'
    alt-shift-8 = 'move-node-to-workspace 8-Comms'
    alt-shift-9 = 'move-node-to-workspace 9-Pers'

    # --- Close Window (Matched to Alt+y) ---
    alt-y = 'close'

    # --- Launchers ---
    alt-enter = "exec-and-forget open -na kitty"
    alt-b = 'exec-and-forget open -na "Google Chrome" --args --new-window --profile-directory="Default"'
    alt-g = 'exec-and-forget open -na "Google Chrome" --args --new-window --profile-directory="Profile 1"'

    # --- General ---
    alt-shift-r = 'reload-config'
    alt-shift-semicolon = 'mode service'

# 'service' binding mode
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-j = ['join-with left', 'mode main']
    alt-shift-k = ['join-with down', 'mode main']
    alt-shift-i = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Matt \(Personal\)'
run = 'move-node-to-workspace 9-Pers'
