# Move the prompt to a new line
add_newline = true

# Module-level execution caps. Set explicitly so we don't get
# "command timed out after 500ms" warnings on slow filesystems
# (network mounts, FUSE overlays) where a `git` invocation
# can exceed the default 500ms budget.
#   scan_timeout    — max ms to scan files for module triggers
#                     (e.g. detect_files=["package.json"]). Bumped
#                     from default 30ms because cold-cache APFS stat
#                     of a directory with 40+ entries (mix of git
#                     repos, fig exports, large dirs) can exceed
#                     30ms on first prompt after login. 100ms is
#                     comfortable headroom; the actual scan returns
#                     in <5ms once the cache is warm.
#   command_timeout — max ms to wait for an external command
#                     (git, mise, etc.) before giving up and
#                     rendering without that module's output.
scan_timeout = 100
command_timeout = 1000

# The main prompt layout. Modules NOT listed here do not render OR
# scan, even if they're "default-enabled" by starship — verified
# empirically 2026-05-11 with a /tmp dir containing trigger files
# for rust/java/kotlin/scala/dart/swift/zig/lua/cpp/terraform/ruby/
# php; only the modules in this format string ran.
#
# Currently active modules (cost in parens, when triggered):
#   directory, fill, character, time, env_var.HOSTNAME_*  (free)
#   git_branch, git_status                                (~5ms in regular dirs;
#                                                          500-750ms on FUSE
#                                                          overlays — see
#                                                          starship-fast.toml
#                                                          swap mechanism in
#                                                          ~/.zshrc)
#   cmd_duration                                          (free)
#   nodejs                                                (~150ms when in a
#                                                          project with
#                                                          package.json)
#   golang                                                (~64ms when in a
#                                                          go.mod project)
#
# Removed (2026-05-11):
#   docker_context — read ~/.docker/config.json on EVERY prompt
#                    (~55-111ms always-on). Use `docker context show`
#                    when you need it.
#   python         — ran `python --version` on every detect, costing
#                    ~320ms when in a python project. Activate
#                    explicitly via `python --version` when needed.
format = """
$directory$git_branch$git_status$fill$cmd_duration$nodejs$golang${env_var.HOSTNAME_LOCAL}${env_var.HOSTNAME_WORK}${env_var.HOSTNAME_REMOTE}${env_var.HOSTNAME_CORP}${env_var.HOSTNAME_ROAM}$time
$character"""

[fill]
symbol = "─"
style = "#444444"

[directory]
style = "bold #00afaf"
truncate_to_repo = false
truncation_length = 8
format = "[$path]($style)[$read_only]($read_only_style)   "

[git_branch]
symbol = " "
style = "bold #5faf5f"

[git_status]
style = "bold #af5f5f"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[cmd_duration]
min_time = 500
style = "bold #ffcc00"
format = "took [$duration]($style) "

[time]
disabled = false
format = "at [$time](bold #888888) "
time_format = "%T"

[nodejs]
symbol = "󰎙 "
format = "[$symbol($version)](bold #5faf5f) "
detect_files = ["package.json", ".node-version", "nvmrc"]

[golang]
symbol = " "
format = "[$symbol($version)](bold #00ffff) "

# [docker_context] and [python] removed 2026-05-11 (see comment on
# format string). To restore: add the module's $name to format and
# uncomment the section.

[hostname]
disabled = true

[env_var.HOSTNAME_LOCAL]
variable = "STARSHIP_HOSTNAME_LOCAL"
style = "bold #00ffff"
format = "[$env_value]($style) "

[env_var.HOSTNAME_WORK]
variable = "STARSHIP_HOSTNAME_WORK"
style = "bold #ffcc00"
format = "[$env_value]($style) "

[env_var.HOSTNAME_REMOTE]
variable = "STARSHIP_HOSTNAME_REMOTE"
style = "bold #ff5f5f"
format = "[$env_value]($style) "

[env_var.HOSTNAME_CORP]
variable = "STARSHIP_HOSTNAME_CORP"
style = "bold #ff8800"
format = "[$env_value]($style) "

[env_var.HOSTNAME_ROAM]
variable = "STARSHIP_HOSTNAME_ROAM"
style = "bold #5fffff"
format = "[$env_value]($style) "

[character]
success_symbol = "[❯](bold #00ff00)"
error_symbol = "[❯](bold #ff0000)"

[package]
disabled = true

[gcloud]
disabled = true
